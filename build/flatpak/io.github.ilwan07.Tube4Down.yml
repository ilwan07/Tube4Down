id: io.github.ilwan07.Tube4Down
runtime: org.kde.Platform
runtime-version: '5.15-24.08'      # Qt5/PyQt5 branch
sdk: org.kde.Sdk
command: tube4down

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri                 # GPU accel for Qt rendering
  - --share=network              # app downloads videos
  - --filesystem=host            # lets the app save finished downloads anywhere
  - --talk-name=ca.desrt.dconf   # dconf access
  - --filesystem=xdg-run/dconf
  - --filesystem=~/.config/dconf:ro

modules:
  - name: gsettings-desktop-schemas  # makes host dconf access work
    buildsystem: meson
    config-opts:
      - -Dintrospection=false   # skip building GObject introspection typelibs, not needed here
    sources:
      - type: archive
        url: https://codeload.github.com/GNOME/gsettings-desktop-schemas/tar.gz/refs/tags/50.1
        sha256: ac9328c00ca18e5ac921bb2c13048b1ce5b43302b0c8d89d7fec22b05e22ec7a
        dest-filename: gsettings-desktop-schemas-50.1.tar.gz

  - name: mit-krb5           # for PyQtWebEngine to work
    buildsystem: simple
    sources:
      - type: archive
        url: https://kerberos.org/dist/krb5/1.21/krb5-1.21.3.tar.gz
        sha256: b7a4cd5ead67fb08b980b21abd150ff7217e85ea320c9ed0c6dadd304840ad35
    build-commands:
      - cd src && autoreconf -i
      - cd src && ./configure --prefix=/app --disable-static --enable-shared
      - cd src && make -j$(nproc)
      - cd src && make install

  - name: python3-deps
    buildsystem: simple
    build-options:
      build-args:
        - --share=network       # pip needs internet to fetch PyPI wheels at build time
    build-commands:
      - pip3 install --prefix=/app --no-cache-dir -r requirements.txt
    sources:
      - type: file
        path: ../../requirements.txt

  - name: tube4down
    buildsystem: simple
    build-commands:
      # main script + assets
      - install -Dm755 Tube4Down.pyw /app/bin/Tube4Down.pyw
      - cp -r assets /app/bin/assets
      # launcher wrapper
      - install -Dm755 build/flatpak/tube4down.sh /app/bin/tube4down
      # desktop integration
      - install -Dm644 build/flatpak/io.github.ilwan07.Tube4Down.desktop /app/share/applications/io.github.ilwan07.Tube4Down.desktop
      - install -Dm644 build/flatpak/io.github.ilwan07.Tube4Down.metainfo.xml /app/share/metainfo/io.github.ilwan07.Tube4Down.metainfo.xml
      - install -Dm644 assets/icon.png /app/share/icons/hicolor/256x256/apps/io.github.ilwan07.Tube4Down.png
    sources:
      - type: dir
        path: ../../             # repo root relative to this manifest's location
